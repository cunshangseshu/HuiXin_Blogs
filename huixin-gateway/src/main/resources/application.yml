server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "http://localhost:3000,http://127.0.0.1:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: huixin-auth
          uri: lb://huixin-auth
          predicates:
            - Path=/api/auth/**
        - id: huixin-user
          uri: lb://huixin-user
          predicates:
            - Path=/api/user/**
        - id: huixin-article
          uri: lb://huixin-article
          predicates:
            - Path=/api/article/**,/api/category/**,/api/tag/**
        - id: huixin-comment
          uri: lb://huixin-comment
          predicates:
            - Path=/api/comment/**
        - id: huixin-search
          uri: lb://huixin-search
          predicates:
            - Path=/api/search/**
        - id: huixin-stats
          uri: lb://huixin-stats
          predicates:
            - Path=/api/stats/**

logging:
  level:
    com.huixin.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
