server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/huixin_blog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  data:
    redis:
      host: 192.168.238.134
      port: 6379
      password: huixin2024redis
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.huixin.common.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    # SQL日志（仅开发环境，生产环境应移除）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j API文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    language: zh_cn

logging:
  level:
    com.huixin.search: DEBUG
